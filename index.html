<!DOCTYPE html>
<html>
<head>
  <title>Atlas de Riesgos</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 250px;
      background: white;
      padding: 10px;
      z-index: 1000;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      font-family: Arial;
    }

    #leyenda {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,0.9);
      padding: 8px;
      z-index: 1000;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
      font-family: Arial;
      font-size: 12px;
      line-height: 1.4;
    }

    .box {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Atlas de Riesgos</h2>
  <div id="info"></div>
</div>

<div id="leyenda"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([19.8, -96.1], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var demarcacionLayer, colindantesLayer, areasLayer, rasterLayer;

  // 🔥 RASTER (tiles)
  var rasterLayer = L.tileLayer('{z}/{x}/{y}.png', {
    opacity: 0.6
  });

  // DEMARCACIÓN
  fetch('demarcacion.geojson')
    .then(res => res.json())
    .then(data => {
      demarcacionLayer = L.geoJSON(data, {
        style: {
          color: "black",
          weight: 2,
          fillOpacity: 0
        },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () {
            document.getElementById("info").innerHTML =
              "<b>Municipio:</b> " + 
              (feature.properties.NOMGEO || "");
          });
        }
      }).addTo(map);
    });

  // COLINDANTES
  fetch('colindantes.geojson')
    .then(res => res.json())
    .then(data => {
      colindantesLayer = L.geoJSON(data, {
        style: {
          color: "#666",
          weight: 1,
          fillOpacity: 0.2
        },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () {
            document.getElementById("info").innerHTML =
              "<b>Municipio colindante:</b> " + 
              (feature.properties.NOMGEO || "");
          });
        }
      }).addTo(map);

      map.fitBounds(colindantesLayer.getBounds());
    });

  // ÁREAS VERDES
  fetch('areas_verdes.geojson')
    .then(res => res.json())
    .then(data => {
      areasLayer = L.geoJSON(data, {
        style: {
          color: "green",
          fillColor: "green",
          fillOpacity: 0.5
        }
      }).addTo(map);
    });

  // CONTROL DE CAPAS + LEYENDA
  setTimeout(() => {
    var overlayMaps = {
      "Demarcación municipal": demarcacionLayer,
      "Municipios colindantes": colindantesLayer,
      "Áreas verdes": areasLayer,
      "Raster": rasterLayer
    };

    L.control.layers(null, overlayMaps).addTo(map);

    actualizarLeyenda();
  }, 1000);

  // FUNCIÓN LEYENDA DINÁMICA
  function actualizarLeyenda() {
    var html = "<b>Leyenda</b><br>";

    if (map.hasLayer(demarcacionLayer)) {
      html += "<span class='box' style='background:black;'></span> Demarcación<br>";
    }

    if (map.hasLayer(colindantesLayer)) {
      html += "<span class='box' style='background:#666;'></span> Colindantes<br>";
    }

    if (map.hasLayer(areasLayer)) {
      html += "<span class='box' style='background:green;'></span> Áreas verdes<br>";
    }

    if (map.hasLayer(rasterLayer)) {
      html += "<span class='box' style='background:blue;'></span> Raster<br>";
    }

    document.getElementById("leyenda").innerHTML = html;
  }

  // EVENTOS
  map.on('overlayadd', actualizarLeyenda);
  map.on('overlayremove', actualizarLeyenda);

</script>

</body>
</html>
