<!DOCTYPE html>
<html>
<head>
  <title>Atlas de Riesgos</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 250px;
      background: white;
      padding: 10px;
      z-index: 1000;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Atlas de Riesgos</h2>
  <div id="info"></div>
</div>

<div id="leyenda">
  <h4>Leyenda</h4>
  <div><span style="color:black;">⬛</span> Demarcación</div>
  <div><span style="color:#666;">⬛</span> Colindantes</div>
  <div><span style="color:green;">⬛</span> Áreas verdes</div>
  
  #leyenda {
  position: absolute;
  bottom: 20px;
  left: 10px;
  background: white;
  padding: 10px;
  z-index: 1000;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  font-family: Arial;
  font-size: 14px;
}
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([19.8, -96.1], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var demarcacionLayer, colindantesLayer, areasLayer;

  // DEMARCACIÓN
  fetch('demarcacion.geojson')
    .then(res => res.json())
    .then(data => {
      demarcacionLayer = L.geoJSON(data, {
        style: {
          color: "black",
          weight: 2,
          fillOpacity: 0
        },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () {
            document.getElementById("info").innerHTML =
              "<b>Municipio:</b> " + 
              (feature.properties.NOMGEO || "");
          });
        }
      }).addTo(map);
    });

  // COLINDANTES
  fetch('colindantes.geojson')
    .then(res => res.json())
    .then(data => {
      colindantesLayer = L.geoJSON(data, {
        style: {
          color: "#666",
          weight: 1,
          fillOpacity: 0.2
        },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () {
            document.getElementById("info").innerHTML =
              "<b>Municipio colindante:</b> " + 
              (feature.properties.NOMGEO || "");
          });
        }
      }).addTo(map);

      map.fitBounds(colindantesLayer.getBounds());
    });

  // ÁREAS VERDES (SIN CLICK)
  fetch('areas_verdes.geojson')
    .then(res => res.json())
    .then(data => {
      areasLayer = L.geoJSON(data, {
        style: {
          color: "green",
          fillColor: "green",
          fillOpacity: 0.5
        }
      }).addTo(map);
    });

  // CONTROL DE CAPAS
  setTimeout(() => {
    var overlayMaps = {
      "Demarcación municipal": demarcacionLayer,
      "Municipios colindantes": colindantesLayer,
      "Áreas verdes": areasLayer
    };

    L.control.layers(null, overlayMaps).addTo(map);
  }, 1000);

</script>

</body>
</html>
