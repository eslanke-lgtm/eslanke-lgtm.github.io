<!DOCTYPE html>
<html>
<head>
  <title>Atlas de Riesgos</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([19.8, -96.1], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // DEMARCACIÓN
  fetch('demarcacion.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: {
          color: "black",
          weight: 2,
          fillOpacity: 0
        }
      }).addTo(map);
    });

  // COLINDANTES
  fetch('colindantes.geojson')
  .then(res => res.json())
  .then(data => {
    var colindantesLayer = L.geoJSON(data, {
      style: {
        color: "red",
        weight: 3,
        fillColor: "red",
        fillOpacity: 0.4
      }
    }).addTo(map);

    // 🔥 AJUSTAR MAPA A LA CAPA
    map.fitBounds(colindantesLayer.getBounds());
  });

  // ÁREAS VERDES
  fetch('areas_verdes.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: {
          color: "green",
          fillColor: "green",
          fillOpacity: 0.5
        }
      }).addTo(map);
    });

</script>

</body>
</html>
